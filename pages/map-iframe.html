<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --black: #000;
            --navBar-color-dark: #131313e6;
            --navBar-color-light: #f2ede4cc;
            --background-dark: #0a0a0a;
            --background-light: #f2ede4;
            --golden-color: #e7c075;
            --golden-hover-color: #bb954f;
            --text-dark: #a4a2a8;
            --active-text: rgb(152, 120, 34);
            --text-light: #6B4F3A;
            --big-text-light: #3E2F23;
            --active-text: #987822;
            --small-text-dark: #b5aa9b;
            --card-background-color: #353534;
            --container-color-light: #fdedbf;
            --container-second-light: #383010;
            --button-light: #937C63;
            --button-hover-light: #7D6852;
            --footer-light: #f2ede4;
            --container-color-light: #F9F3E5;
            --container-second-light: #383010;
            --information-cnt: #181818;
        }

        @font-face {
            font-family: main-font;
            src: url(../assets/Fonts/noto-serif.regular.ttf);
        }

        @font-face {
            font-family: bold-font;
            src: url(../assets/Fonts/noto-serif.bold-italic.ttf);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            overflow-y: visible;
        }

        body::-webkit-scrollbar {
            display: none;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: auto;
            user-select: none;
        }

        body.grap {
            cursor: grab;
        }

        body.grap:active {
            cursor: grabbing;
        }

        #iframe-container {
            transform-origin: left top;
            transition: 0.4s;
        }

        #map {
            position: absolute;
            width: 100%;
            opacity: 1;
            transition: 0.4s;
        }

        #map.light {
            filter: invert(100%) sepia(0.6) saturate(80%) brightness(90%) contrast(110%);
        }

        #zoom-in:hover {
            transform: scale(0.94)
        }

        #zoom-in:active {
            background-color: #b39254;
        }

        #zoom-in.light:active {
            background-color: var(--button-hover-light);
        }

        #zoom-out:hover {
            transform: scale(0.94)
        }

        #zoom-out:active {
            background-color: #b39254;
        }

        #zoom-out.light:active {
            background-color: var(--button-hover-light);
        }

        #zoom-btn {
            position: fixed;
            display: flex;
            flex-direction: column;
            gap: 3vh;
            margin-left: 2%;
            top: 2vh;
        }

        #zoom-btn button {
            position: sticky;
            width: 50px;
            height: 50px;
            background-color: var(--golden-color);
            border-radius: 20%;
            border: none;
            font-size: 40px;
            color: #4e3700;
            cursor: pointer;
            transition: 0.3s;
        }

        #zoom-btn button.light {
            background-color: var(--button-light);
            color: white;
        }

        #icons-container img {
            position: absolute;
            display: flex;
            cursor: pointer;
            transition: 0.3s;
        }

        #icons-container img.light {
            filter: brightness(0.4) sepia(0.8) saturate(80%);
        }

        #icons-container img:hover,
        #icons-container img.active {
            filter: drop-shadow(0 0 10px #b39254);
            scale: 1.1;
        }

        #icons-container img.light:hover,
        #icons-container img.light.active {
            filter: brightness(0.4) sepia(0.8) saturate(80%) drop-shadow(0 0 10px #362621);
            scale: 1.1;
        }

        #icons-container p {
            position: absolute;
            color: #e7c075;
            font-size: 1.5vw;
            text-align: center;
            text-shadow: 0 0 10px #e7c075;
            transition: 0.3s;
            opacity: 0;
            font-family: bold-font;
        }

        #icons-container p.light {
            color: #5D4037;
            text-shadow: 0 0 20px #362621;
        }

        #pyramid {
            width: 7%;
            margin-left: 48%;
            margin-top: 16%;
        }

        #pyramid-p {
            margin-top: 21%;
            margin-left: 48%;
        }

        #pyramid:hover+#pyramid-p,
        #pyramid.active+#pyramid-p {
            opacity: 1;
        }


        #siwa {
            width: 4.5%;
            margin-top: 18%;
            margin-left: 7%;
        }

        #siwa-p {
            margin-top: 21%;
            margin-left: 11%;
        }

        #siwa:hover+#siwa-p,
        #siwa.active+#siwa-p {
            opacity: 1;
        }

        #bahariya {
            width: 4.5%;
            margin-top: 25%;
            margin-left: 30%;
        }

        #bahariya-p {
            margin-top: 28%;
            margin-left: 34%;
        }

        #bahariya:hover+#bahariya-p,
        #bahariya.active+#bahariya-p {
            opacity: 1;
        }

        #farafra {
            width: 4.5%;
            margin-top: 33%;
            margin-left: 24%;
            transition: 0.4s;
        }

        #farafra-p {
            margin-top: 36%;
            margin-left: 18%;
        }

        #farafra:hover+#farafra-p,
        #farafra.active+#farafra-p {
            opacity: 1;
        }

        #dakhla {
            width: 4.5%;
            margin-top: 41%;
            margin-left: 37%;
        }

        #dakhla-p {
            margin-top: 44%;
            margin-left: 31%;
        }

        #dakhla:hover+#dakhla-p,
        #dakhla.active+#dakhla-p {
            opacity: 1;
        }

        #kharga {
            width: 4.5%;
            margin-top: 41%;
            margin-left: 46%;
        }

        #kharga-p {
            margin-top: 44%;
            margin-left: 50%;
        }

        #kharga:hover+#kharga-p,
        #kharga.active+#kharga-p {
            opacity: 1;
        }

        #abu-simbel {
            width: 5%;
            margin-top: 59%;
            margin-left: 58%;
        }

        #abu-simbel-p {
            margin-top: 65%;
            margin-left: 56%;
        }

        #abu-simbel:hover+#abu-simbel-p,
        #abu-simbel.active+#abu-simbel-p {
            opacity: 1;
        }

        #karnak {
            width: 4%;
            margin-top: 42%;
            margin-left: 65%
        }

        #karnak-p {
            margin-top: 47%;
            margin-left: 63%;
        }

        #karnak:hover+#karnak-p,
        #karnak.active+#karnak-p {
            opacity: 1;
        }
    </style>
</head>

<body class="dragscroll">
    <div id="iframe-container">
        <img src="../assets/images/Map-imgs/dark-map.jpg" id="map" draggable="false">
        <div id="icons-container">
            <img src="../assets/images/Map-imgs/pyramids.png" id="pyramid" onclick="selected(this.id)"
                draggable="false">
            <p id="pyramid-p">
                Great
                <br>
                Pyramid
            </p>
            <img src="../assets/images/Map-imgs/Trees.png" id="siwa" onclick="selected(this.id)" draggable="false">
            <p id="siwa-p">Siwa</p>
            <img src="../assets/images/Map-imgs/Trees.png" id="bahariya" onclick="selected(this.id)" draggable="false">
            <p id="bahariya-p">Bahariya</p>
            <img src="../assets/images/Map-imgs/Trees.png" id="farafra" onclick="selected(this.id)" draggable="false">
            <p id="farafra-p">Farafra</p>
            <img src="../assets/images/Map-imgs/Trees.png" id="dakhla" onclick="selected(this.id)" draggable="false">
            <p id="dakhla-p">Dakhla</p>
            <img src="../assets/images/Map-imgs/Trees.png" id="kharga" onclick="selected(this.id)" draggable="false">
            <p id="kharga-p">Kharga</p>
            <img src="../assets/images/Map-imgs/big-temple.png" id="abu-simbel" onclick="selected(this.id)"
                draggable="false">
            <p id="abu-simbel-p">Abu Simbel</p>
            <img src="../assets/images/Map-imgs/small-temple.png" id="karnak" onclick="selected(this.id)"
                draggable="false">
            <p id="karnak-p">El Karnak</p>
        </div>
    </div>
    <div id="zoom-btn">
        <button id="zoom-in" onclick="zoomIn()">+</button>
        <button id="zoom-out" onclick="zoomout()">-</button>
    </div>
    <script src="../js/map.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dragscroll/0.0.8/dragscroll.min.js"></script>
</body>

</html>
