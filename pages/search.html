<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search</title>
    <link rel="stylesheet" href="../css/main.css">
    <!-- !!ملف تنسيق الناف بار والفوتر مهم -->

    <script src="https://kit.fontawesome.com/728f1f9039.js" crossorigin="anonymous"></script>
    <!-- Icons file -->

    <link rel="stylesheet" href="../css/search.css">

</head>

<body>
    <nav class="nav-bar">
        <div class="nav-text">
            ANCIENT HERITAGE
        </div>
        <div class="nav-cnt">
            <div class="nav-links">
                <a href="../index.html">Home</a>
                <a href="archive.html">Archive</a>
                <a href="museums.html">Museum</a>
                <a href="map.html">Map</a>
                <a href="search.html" class="active">Search</a>
            </div>
        </div>
        <div class="sign">
            <a class="sign-btn" href="sign-up.html">Sign up</a>
        </div>
    </nav>
    <main>
        <h1 class="search-header">Search Results</h1>
        <div class="search-window">
            <input type="text">
            <button type="submit">Excute Search</button>
        </div>
        <div class="search-filters">
            <div class="filter-era">
                <label for="era">Era</label>
                <select name="era" id="era">
                    <option value="all-eras">All Eras</option>
                    <option value="Pharaonic">Pharaonic</option>
                    <option value="romanian">Romanian</option>
                    <option value="greek">Greek</option>
                    <option value="coptic">Copic</option>
                    <option value="islamic">Islamic</option>
                    <option value="modern">Modern</option>
                </select>
            </div>
            <div class="filter-region">
                <label for="region">Geographic Region</label>
                <select name="region" id="region">
                    <option value="all-regions">All Regions</option>
                    <option value="south">Southern Egypt</option>
                    <option value="north">Northern Egypt</option>
                    <option value="middle">middle Egypt</option>
                </select>
            </div>
            <div class="filter-musuem">
                <label for="museum">Museum</label>
                <select name="museum" id="museum">
                    <option value="all-museums">All Museums</option>
                    <option value="gem">The Grand Egyptian Museum</option>
                    <option value="egyptian-museum">The Egyptian Museum</option>
                    <option value="nmec">NMEC</option>
                    <option value="coptic">The Coptic Museum</option>
                    <option value="islamic">The Museum of Islamic Art</option>
                </select>
            </div>
            <div class="filter-method">
                <button class="grid active-method"><i class="fa-solid fa-table-cells"></i> Grid</button>
                <button class="list"><i class="fa-solid fa-list"></i> List</button>
            </div>
        </div>
        <div class="cards-container">
            <div class="card">
                <img src="" alt="" class="artifact-image">
                <p class="artifact-subtitle"></p>
                <h1 class="artifact-header"></h1>
                <p class="artifact-info"></p>
                <!-- <span><i class="fa-solid fa-heart"></i></span>
                <span><i class="fa-solid fa-box-archive"></i></span> -->
            </div>
        </div>
    </main>
    <footer class="footer">
        <div class="copy-right">
            <h5>
                ANCIENT HERITAGE
            </h5>
            <p>
                © 2026 CAPITAL UNIVERSITY. All Rights Reserved.
            </p>
        </div>
        <div class="footer-links">
            <a href="https://www.capu.edu.eg/index.php/ar/" target="_blank">University site</a>
            <a href="feedback.html">Feed Back</a>
            <a href="about.html">About Us</a>
        </div>
    </footer>
    <script src="../js/main.js"></script>
    <script src="../js/search.js"></script>
</body>

</html>
